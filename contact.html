<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>DigitalArchitect | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1326] text-[#dae2fd]">
    <nav class="fixed top-0 w-full z-50 bg-slate-950/60 backdrop-blur-xl py-4 px-6">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="text-2xl font-bold">DigitalArchitect</div>
            <div class="hidden md:flex space-x-8">
                <a class="text-slate-400" href="index.html">Home</a>
                <a class="text-slate-400" href="projects.html">Projects</a>
                <a class="text-slate-400" href="skills.html">Skills</a>
                <a class="text-slate-400" href="experience.html">Experience</a>
                <a class="text-cyan-400 border-b-2 border-cyan-400" href="contact.html">Contact</a>
            </div>
        </div>
    </nav>
    <main class="pt-32 px-6 max-w-3xl mx-auto">
        <h1 class="text-5xl font-bold mb-8 text-center">Contact Me</h1>
        <form class="space-y-6 bg-slate-900 p-8 rounded-xl">
            <input type="text" placeholder="Name" class="w-full bg-slate-800 p-3 rounded-md outline-none border border-slate-700 focus:border-cyan-400">
            <input type="email" placeholder="Email" class="w-full bg-slate-800 p-3 rounded-md outline-none border border-slate-700 focus:border-cyan-400">
            <textarea placeholder="Message" rows="5" class="w-full bg-slate-800 p-3 rounded-md outline-none border border-slate-700 focus:border-cyan-400"></textarea>
            <button class="w-full bg-cyan-400 text-black py-4 font-bold rounded-md uppercase">Transmit Message</button>
        </form>
    </main>
</body>
</html>
